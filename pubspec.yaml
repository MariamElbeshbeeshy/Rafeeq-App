name: rafeeq_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_localizations: 
    sdk: flutter
  flutter_timer_countdown: ^1.0.7
  permission_handler: ^12.0.1
  qr_scanner_overlay: ^0.0.2
  dio: ^5.9.1
  flutter_bloc: ^9.1.1
  pinput: ^6.0.2
  mobile_scanner: ^7.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dotted_border: ^3.1.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/achievements/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VariableFont_slnt,wght.ttf
    - family: Arial
      fonts:
        - asset: assets/fonts/ARIAL.TTF
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf

    - family: PlaypenSansArabic
      fonts:
        - asset: assets/fonts/PlaypenSansArabic-VariableFont_wght.ttf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf